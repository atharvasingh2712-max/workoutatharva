<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GRIND</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap');
:root {
  --bg:#0a0a0a;--surface:#141414;--card:#1a1a1a;--border:#252525;
  --accent:#e8ff47;--accent2:#ff6b35;--blue:#5b9cf6;--green:#5fbb00;
  --purple:#b06aff;--pink:#ff6b9d;--text:#f0f0f0;--muted:#555;
  --done-bg:#141414;--done-text:#333;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px;}

.sync-bar{display:flex;align-items:center;justify-content:center;gap:6px;padding:5px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;transition:all 0.3s;}
.sync-bar.syncing{background:#1a1a00;color:var(--accent);}
.sync-bar.saved{background:#0a1a00;color:var(--green);}
.sync-bar.error{background:#1a0a00;color:var(--accent2);}
.sync-bar.idle{display:none;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:currentColor;}
.sync-bar.syncing .sync-dot{animation:pulse 0.8s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

.phase-banner{background:linear-gradient(135deg,#0f1a00,#1a2d00);border-bottom:1px solid #2a4400;padding:8px 16px;display:flex;align-items:center;justify-content:space-between;}
.phase-banner.p2{background:linear-gradient(135deg,#0a0a1f,#0f0f2a);border-bottom-color:#2a2a5a;}
.phase-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--green);}
.phase-banner.p2 .phase-label{color:var(--blue);}
.phase-name{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1px;color:var(--accent);}
.countdown-pill{background:rgba(0,0,0,0.4);border:1px solid #2a4400;border-radius:20px;padding:2px 9px;text-align:center;}
.phase-banner.p2 .countdown-pill{border-color:#2a2a5a;}
.countdown-num{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--accent);line-height:1;}
.countdown-label{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}

header{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:10px 16px 8px;}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.app-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;color:var(--accent);}

.week-nav{display:flex;align-items:center;gap:7px;margin-bottom:8px;}
.week-nav-btn{width:30px;height:30px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;user-select:none;}
.week-nav-btn:active{background:var(--border);}
.week-nav-btn.disabled{opacity:0.2;pointer-events:none;}
.week-nav-center{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 10px;display:flex;justify-content:space-between;align-items:center;}
.week-nav-label{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:1px;color:var(--accent);}
.week-nav-sub{font-size:10px;color:var(--muted);}
.week-nav-tag{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:2px 7px;border-radius:20px;}
.week-nav-tag.current{background:rgba(232,255,71,0.15);color:var(--accent);}
.week-nav-tag.past{background:rgba(85,85,85,0.2);color:var(--muted);}
.week-nav-tag.p1{background:rgba(95,187,0,0.12);color:var(--green);}
.week-nav-tag.p2{background:rgba(91,156,246,0.12);color:var(--blue);}

.day-tabs{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.day-tabs::-webkit-scrollbar{display:none;}
.day-tab{flex-shrink:0;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;transition:all 0.2s;}
.day-tab.active{background:var(--accent);color:#000;border-color:var(--accent);}
.day-tab.complete{border-color:#2a6a00;color:var(--green);}
.day-progress-bar{height:2px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden;}
.day-progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.4s ease;}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--surface);border-top:1px solid var(--border);display:flex;height:58px;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;font-size:9px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;}
.nav-btn .nav-icon{font-size:18px;}
.nav-btn.active{color:var(--accent);}

.screen{display:none;}
.screen.active{display:block;}

.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;}
.loading-spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--muted);}

.content{padding:12px 14px 0;}
.past-banner{background:rgba(255,107,53,0.08);border:1px solid rgba(255,107,53,0.25);border-radius:10px;padding:9px 12px;font-size:12px;color:var(--accent2);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.day-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;}
.day-title{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:2px;line-height:1;}
.day-subtitle{font-size:10px;color:var(--muted);margin-top:3px;font-weight:500;text-transform:uppercase;letter-spacing:1px;}
.reset-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:5px 10px;border-radius:8px;font-size:10px;font-family:'DM Sans',sans-serif;cursor:pointer;flex-shrink:0;margin-top:4px;}
.reset-btn:active{background:var(--border);}

.phase-toggle{display:flex;gap:6px;margin-bottom:12px;}
.phase-btn{flex:1;padding:8px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;cursor:pointer;text-align:center;transition:all 0.2s;}
.phase-btn.active{background:var(--accent);color:#000;border-color:var(--accent);}
.phase-btn .btn-label{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1px;display:block;}
.phase-btn .btn-sub{font-size:9px;margin-top:1px;opacity:0.7;}

.section{margin-bottom:15px;}
.section-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--accent2);margin-bottom:6px;padding-left:4px;}
.section-label.blue{color:var(--blue);}
.section-label.green{color:var(--green);}
.section-label.purple{color:var(--purple);}
.section-label.yellow{color:var(--accent);}
.section-label.pink{color:var(--pink);}

.exercise-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:5px;cursor:pointer;transition:all 0.15s;user-select:none;}
.exercise-item:active{transform:scale(0.98);}
.exercise-item.checked{background:var(--done-bg);border-color:#1e1e1e;}
.checkbox{width:20px;height:20px;border-radius:5px;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;}
.exercise-item.checked .checkbox{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700;}
.exercise-text{flex:1;}
.exercise-name{font-size:13px;font-weight:500;line-height:1.3;}
.exercise-item.checked .exercise-name{color:var(--done-text);text-decoration:line-through;}
.exercise-detail{font-size:10px;color:var(--muted);margin-top:1px;}

.completion-banner{background:linear-gradient(135deg,#1a2a00,#0d1a00);border:1px solid #3a6a00;border-radius:12px;padding:12px;text-align:center;margin-bottom:12px;}
.completion-banner .emoji{font-size:24px;margin-bottom:4px;}
.completion-banner h3{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--accent);}
.completion-banner p{font-size:11px;color:var(--green);margin-top:2px;}

.rest-hero{text-align:center;padding:22px 0 10px;}
.rest-hero .icon{font-size:44px;}
.rest-hero .title{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:3px;color:var(--accent);margin-top:6px;}
.rest-hero .sub{font-size:11px;color:var(--muted);margin-top:3px;}

.locked-overlay{display:flex;flex-direction:column;align-items:center;padding:32px 20px;text-align:center;}
.locked-overlay .lock{font-size:40px;margin-bottom:12px;}
.locked-overlay h3{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;color:var(--blue);margin-bottom:6px;}
.locked-overlay .days-left{font-family:'Bebas Neue',sans-serif;font-size:56px;color:var(--accent);line-height:1;margin:12px 0 4px;}
.locked-overlay .days-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;}
.locked-overlay p{font-size:12px;color:var(--muted);line-height:1.6;margin-top:12px;}

.history-content{padding:14px 14px 0;}
.history-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;margin-bottom:3px;}
.history-sub{font-size:11px;color:var(--muted);margin-bottom:14px;}
.stats-row{display:flex;gap:7px;margin-bottom:16px;}
.stat-card{flex:1;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:11px 8px;text-align:center;}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--accent);line-height:1;}
.stat-label{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}

.week-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px;margin-bottom:9px;cursor:pointer;}
.week-card:active{border-color:var(--accent);}
.week-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;}
.week-card-title{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:1px;}
.week-phase-tag{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:2px 7px;border-radius:20px;}
.week-phase-tag.p1{background:rgba(95,187,0,0.12);color:var(--green);}
.week-phase-tag.p2{background:rgba(91,156,246,0.12);color:var(--blue);}
.week-phase-tag.current{background:rgba(232,255,71,0.12);color:var(--accent);}
.day-dots{display:flex;gap:4px;margin-bottom:9px;}
.day-dot{flex:1;height:26px;border-radius:6px;background:var(--surface);border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;}
.day-dot.done{background:rgba(95,187,0,0.12);border-color:#2a6a00;}
.day-dot.partial{background:rgba(232,255,71,0.06);border-color:#3a3a00;}
.day-dot.today{border-color:var(--accent);}
.day-dot .dot-label{font-size:7px;font-weight:700;color:var(--muted);text-transform:uppercase;}
.day-dot.done .dot-label{color:var(--green);}
.day-dot .dot-icon{font-size:9px;}
.week-bar-wrap{display:flex;align-items:center;gap:8px;}
.week-bar{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.week-bar-fill{height:100%;background:var(--green);border-radius:2px;}
.week-bar-pct{font-size:11px;font-weight:600;color:var(--muted);flex-shrink:0;min-width:30px;text-align:right;}
.week-ex-count{font-size:11px;color:var(--muted);margin-top:7px;}
.week-ex-count span{color:var(--text);font-weight:600;}
.week-card-footer{font-size:10px;color:var(--accent);margin-top:8px;text-align:right;}
</style>
</head>

// ─── SKIPPED DAY LOGIC ───────────────────────────────────────
var SKIP_EXCLUDED_SECTIONS = ['warmup','pre-workout','post-workout','active recovery'];

function isExcludedSection(name){
  var n = name.toLowerCase();
  return SKIP_EXCLUDED_SECTIONS.some(function(ex){ return n.indexOf(ex) !== -1; });
}

function getExercisesFromDay(dayId){
  // Get all exercises from a day excluding warmup/stretching sections
  var allDays = PHASE1.concat(PHASE2);
  var day = allDays.filter(function(d){ return d.id === dayId; })[0];
  if(!day) return [];
  var exercises = [];
  day.sections.forEach(function(sec){
    if(!isExcludedSection(sec.name)){
      sec.items.forEach(function(item){
        exercises.push({name: item.name, detail: item.detail || ''});
      });
    }
  });
  return exercises;
}

// Day order for chaining
var DAY_ORDER_P1 = ['p1_mon','p1_tue','p1_wed','p1_thu','p1_fri','p1_sat','p1_sun'];
var DAY_ORDER_P2 = ['p2_mon','p2_tue','p2_wed','p2_thu','p2_fri','p2_sat','p2_sun'];

function getNextDayId(dayId){
  var order = dayId.indexOf('p1_') === 0 ? DAY_ORDER_P1 : DAY_ORDER_P2;
  var idx = order.indexOf(dayId);
  return idx >= 0 && idx < order.length - 1 ? order[idx + 1] : null;
}

function getSkippedKey(){return 'grind_skipped_w'+viewingWeek;}
function getSkippedDays(){return JSON.parse(localStorage.getItem(getSkippedKey())||'[]');}

function markDaySkipped(){
  var days=getDaysForWeek(viewingWeek);
  var dayId=days[activeDayIdx].id;
  var skipped=getSkippedDays();
  if(!skipped.includes(dayId)){
    skipped.push(dayId);
    localStorage.setItem(getSkippedKey(),JSON.stringify(skipped));
    if(skipped.length===3) showSkipWarning();
  }
  renderWorkout();
}
function unskipDay(){
  var days=getDaysForWeek(viewingWeek);
  var dayId=days[activeDayIdx].id;
  var skipped=getSkippedDays().filter(function(id){return id!==dayId;});
  localStorage.setItem(getSkippedKey(),JSON.stringify(skipped));
  renderWorkout();
}

    +'<\/div>';

function resolveTarget(sid, skipped){
  // Follow the chain — if next day is also skipped, keep going
  var next = getNextDayId(sid);
  if(!next) return null;
  if(skipped.includes(next)) return resolveTarget(next, skipped);
  return next;
}

function getCarryoverForCurrentDay(){
  var days = getDaysForWeek(viewingWeek);
  var currentDayId = days[activeDayIdx].id;
  var skipped = getSkippedDays();

  // Get all exercises in today's day (to avoid duplicates)
  var todayExercises = getExercisesFromDay(currentDayId).map(function(e){ return e.name.toLowerCase(); });

  var carries = [];
  var seen = {};
  var addedNames = {}; // track names already added to avoid cross-day dupes

  skipped.forEach(function(sid){
    if(seen[sid]) return;
    if(resolveTarget(sid, skipped) !== currentDayId) return;
    seen[sid] = true;

    var label = sid; // will use day title
    var allDays = PHASE1.concat(PHASE2);
    var skippedDay = allDays.filter(function(d){ return d.id === sid; })[0];
    if(skippedDay) label = skippedDay.title + ' (' + skippedDay.label + ')';

    var candidates = getExercisesFromDay(sid);
    candidates.forEach(function(ex){
      if(carries.length >= 5) return;
      var nameLower = ex.name.toLowerCase();
      // skip if today already has this exercise or already added
      if(todayExercises.indexOf(nameLower) !== -1) return;
      if(addedNames[nameLower]) return;
      addedNames[nameLower] = true;
      carries.push({name: ex.name, detail: '2×' + (ex.detail.split('×')[1] || '10') + ' (carry-over)', from: label});
    });
  });

  return carries;
}

// ─── FIRESTORE + LOCAL FALLBACK ─────────────────────────────
function loadFromCloud(){
  // Always render immediately from local cache so app never hangs
  cloudData=JSON.parse(localStorage.getItem('grind_cache')||'{}');
  renderPhaseBanner();
  renderWorkout();
  // Then try Firebase in background — update if it responds within 4s
  var done=false;
  var timeout=setTimeout(function(){done=true;},4000);
  DOC_REF.get().then(function(snap){
    if(done) return;
    clearTimeout(timeout);
    if(snap.exists){
      var remote=snap.data().checks||{};
      // merge: remote wins for keys it has, local keeps the rest
      Object.keys(remote).forEach(function(k){cloudData[k]=remote[k];});
      if(snap.data().startDate) localStorage.setItem('grind_start',snap.data().startDate);
      localStorage.setItem('grind_cache',JSON.stringify(cloudData));
      renderPhaseBanner();
      renderWorkout();
    } else {
      DOC_REF.set({checks:cloudData,startDate:startDate});
    }
  }).catch(function(){});
}
function saveToCloud(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(function(){
    localStorage.setItem('grind_cache',JSON.stringify(cloudData));
    DOC_REF.set({checks:cloudData,startDate:startDate},{merge:true}).catch(function(){});
  },800);
}

// ─── DATA ACCESS ─────────────────────────────────────────────
function wKey(w){return 'w'+w;}
function getCheck(week,dayId,si,ii){var wk=cloudData[wKey(week)];return !!(wk&&wk[dayId+'_'+si+'_'+ii]);}
function setCheck(week,dayId,si,ii,val){
  if(!cloudData[wKey(week)]) cloudData[wKey(week)]={};
  cloudData[wKey(week)][dayId+'_'+si+'_'+ii]=val;
  saveToCloud();
}
function clearDayChecks(week,day){
  if(!cloudData[wKey(week)]) return;
  day.sections.forEach(function(s,si){s.items.forEach(function(_,ii){delete cloudData[wKey(week)][day.id+'_'+si+'_'+ii];});});
  saveToCloud();
}

// ─── WEIGHT LOGGER ───────────────────────────────────────────
// weightData: { "p1_mon_0_squat": { w1: {kg:60,reps:'3x8'}, w2: {kg:62.5,reps:'3x8'} } }
var weightData = {};
var weightSaveTimer = null;

function weightKey(dayId, si, itemName) {
  return dayId + '_' + si + '_' + itemName.replace(/[^a-zA-Z0-9]/g,'').toLowerCase();
}

function getWeight(dayId, si, itemName, week) {
  var k = weightKey(dayId, si, itemName);
  return (weightData[k] && weightData[k]['w'+week]) || null;
}

function getPR(dayId, si, itemName) {
  var k = weightKey(dayId, si, itemName);
  if (!weightData[k]) return null;
  var best = 0;
  Object.values(weightData[k]).forEach(function(e){ if(e.kg > best) best = e.kg; });
  return best > 0 ? best : null;
}

function saveWeight(dayId, si, itemName, week, kg, reps) {
  var k = weightKey(dayId, si, itemName);
  if (!weightData[k]) weightData[k] = {};
  weightData[k]['w'+week] = {kg: parseFloat(kg), reps: reps};
  // debounced save to firebase
  clearTimeout(weightSaveTimer);
  weightSaveTimer = setTimeout(function(){
    showSync('syncing','Saving weights...');
    db.collection('weights').doc('atharva').set(weightData, {merge:false}).then(function(){
      showSync('saved','Saved ✓');
    }).catch(function(){ showSync('error','Weight save failed'); });
  }, 1500);
}

function loadWeights() {
  db.collection('weights').doc('atharva').get().then(function(snap){
    if (snap.exists) weightData = snap.data() || {};
  }).catch(function(){
    weightData = JSON.parse(localStorage.getItem('grind_weights') || '{}');
  });
}

function toggleLogger(el) {
  el.classList.toggle('log-open');
}

function saveWeightEntry(dayId, si, itemName, week, inputId) {
  var val = document.getElementById(inputId).value;
  if (!val) return;
  var name = decodeURIComponent(itemName);
  var pr = getPR(dayId, si, name);
  saveWeight(dayId, si, name, week, val, '');
  // save local cache too
  localStorage.setItem('grind_weights', JSON.stringify(weightData));
  // update button text
  var btn = document.querySelector('[onclick*="'+inputId+'"]');
  if (btn) btn.textContent = '✓ '+val+'kg';
  // show PR badge if beaten
  var prEl = document.getElementById(inputId + '_pr');
  if (prEl && (pr === null || parseFloat(val) > pr)) prEl.classList.add('show');
}

function countDayStats(week,day){
  var done=0,total=0;
  day.sections.forEach(function(s,si){s.items.forEach(function(_,ii){total++;if(getCheck(week,day.id,si,ii))done++;});});
  return {done:done,total:total};
}
function getDaysForWeek(w){return getPhaseForWeek(w)===1?PHASE1:PHASE2;}

function renderWorkout(){
  var curWeek=getCurrentWeek();
  var isPast=viewingWeek<curWeek;
  var days=getDaysForWeek(viewingWeek);
  var phase=getPhaseForWeek(viewingWeek);
  var ds=countDayStats(viewingWeek,days[activeDayIdx]);
  var pct=ds.total>0?(ds.done/ds.total)*100:0;

  var tabsHtml='<div class="week-nav">'
    +'<div class="week-nav-btn'+(viewingWeek<=1?' disabled':'')+'" onclick="changeWeek(-1)">&#8249;</div>'
    +'<div class="week-nav-center"><div><div class="week-nav-label">WEEK '+viewingWeek+'</div>'
    +'<div class="week-nav-sub">'+(phase===1?'Phase 1 · Foundation':'Phase 2 · 2× Frequency')+'</div></div>'
    +'<div class="week-nav-tag '+(viewingWeek===curWeek?'current':isPast?'past':'p1')+'">'
    +(viewingWeek===curWeek?'This Week':isPast?'Past Week':'Upcoming')+'</div></div>'
    +'<div class="week-nav-btn'+(viewingWeek>=(isPhase2Unlocked()?curWeek:Math.max(curWeek,PHASE2_WEEKS))?' disabled':'')+'" onclick="changeWeek(1)">&#8250;</div>'
    +'</div><div class="day-tabs">';

  days.forEach(function(day,idx){
    var s=countDayStats(viewingWeek,day);
    var complete=s.done===s.total&&s.total>0;
    tabsHtml+='<div class="day-tab'+(idx===activeDayIdx?' active':'')+(complete?' complete':'')+'" onclick="setDay('+idx+')">'+day.label+'</div>';
  });
  tabsHtml+='</div><div class="day-progress-bar"><div class="day-progress-fill" style="width:'+pct+'%"></div></div>';
  document.getElementById('workout-header-extra').innerHTML=tabsHtml;
  document.getElementById('header-right').innerHTML='<div style="font-size:11px;color:var(--muted);font-weight:600">'+ds.done+'<span style="color:var(--accent)">\/'+ds.total+'<\/span><\/div>';

  var day=days[activeDayIdx];
  var html='';

  if(isPast) html+='<div class="past-banner">📅 Week '+viewingWeek+' — tap any exercise to update<\/div>';

  if(viewingWeek===curWeek){
    html+='<div class="phase-toggle">'
      +'<div class="phase-btn'+(viewingPhase===1?' active':'')+'" onclick="switchPhase(1)"><span class="btn-label">PHASE 1<\/span><span class="btn-sub">Foundation · Wks 1–4<\/span><\/div>'
      +'<div class="phase-btn'+(viewingPhase===2?' active':'')+'" onclick="switchPhase(2)"><span class="btn-label">PHASE 2<\/span><span class="btn-sub">2× Frequency · Wk 5+<\/span><\/div>'
      +'<\/div>';
    if(viewingPhase===2&&!isPhase2Unlocked()){
      var dl=getDaysUntilPhase2();
      html+='<div class="locked-overlay"><div class="lock">🔒<\/div><h3>Locked Until Week 5<\/h3>'
        +'<div class="days-left">'+dl+'<\/div><div class="days-label">Days Remaining<\/div>'
        +'<p>Unlocks automatically in <strong style="color:var(--accent)">'+Math.ceil(dl/7)+' week'+(Math.ceil(dl/7)!==1?'s':'')+'<\/strong>.<\/p><\/div>';
      document.getElementById('workout-content').innerHTML=html;return;
    }
  }

  var stat=countDayStats(viewingWeek,day);
  var skippedDays=getSkippedDays();
  var isSkipped=skippedDays.includes(day.id);
  html+='<div class="day-header"><div><div class="day-title">'+day.title+'<\/div><div class="day-subtitle">'+day.subtitle+'<\/div><\/div>'
    +'<div style="display:flex;gap:6px;margin-top:4px;">'
    +'<button class="reset-btn" onclick="resetDay()">Reset<\/button>'
    +(isSkipped
  ?'<button class="reset-btn" style="border-color:#ff6b35;color:#ff6b35;" onclick="unskipDay()">⚡ Skipped<\/button>'
  +'<button class="reset-btn" style="font-size:9px;" onclick="unskipDay()">Undo<\/button>'
  :'<button class="reset-btn" onclick="markDaySkipped()">Skip Day<\/button>')
    +'<\/div><\/div>';
  var carries=getCarryoverForCurrentDay();
  if(carries.length>0){
    // group carries by source day
    var carryGroups={};
    carries.forEach(function(ex){
      if(!carryGroups[ex.from]) carryGroups[ex.from]=[];
      carryGroups[ex.from].push(ex);
    });
    html+='<div style="background:rgba(255,107,53,0.08);border:1px solid rgba(255,107,53,0.3);border-radius:10px;padding:10px 12px;margin-bottom:12px;">'
      +'<div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:#ff6b35;margin-bottom:8px;">⚡ Carry-Over From Skipped Day(s)<\/div>';
    Object.keys(carryGroups).forEach(function(src){
      html+='<div style="font-size:9px;color:#ff6b35;opacity:0.7;margin:6px 0 4px;text-transform:uppercase;letter-spacing:1px;">From '+src+'<\/div>';
      carryGroups[src].forEach(function(ex){
        html+='<div style="display:flex;align-items:center;gap:10px;padding:8px 10px;background:#1a1200;border:1px solid #3a2a00;border-radius:8px;margin-bottom:4px;">'
          +'<div style="width:20px;height:20px;border-radius:5px;border:2px solid #ff6b35;flex-shrink:0;"><\/div>'
          +'<div><div style="font-size:13px;font-weight:500;">'+ex.name+'<\/div>'
          +'<div style="font-size:10px;color:#ff6b35;">'+ex.detail+'<\/div><\/div><\/div>';
      });
    });
    html+='<\/div>';
  }

  if(stat.done===stat.total&&stat.total>0){
    html+='<div class="completion-banner"><div class="emoji">🔥<\/div><h3>Day Complete!<\/h3><p>'+stat.done+'\/'+stat.total+' done · Keep grinding!<\/p><\/div>';
  }
  if(day.rest){
    html+='<div class="rest-hero"><div class="icon">😴<\/div><div class="title">REST DAY<\/div><div class="sub">Light recovery only<\/div><\/div>';
  }

  day.sections.forEach(function(sec,si){
    html+='<div class="section"><div class="section-label '+sec.color+'">'+sec.name+'<\/div>';
    var isWorkingSet=(sec.name==='Working Sets');
    sec.items.forEach(function(item,ii){
      var checked=getCheck(viewingWeek,day.id,si,ii);
      var inputId='inp_'+day.id+'_'+si+'_'+ii+'_w'+viewingWeek;
      var prevWeight=isWorkingSet?getWeight(day.id,si,item.name,viewingWeek):null;
      var lastWeekWeight=isWorkingSet?getWeight(day.id,si,item.name,viewingWeek-1):null;
      var pr=isWorkingSet?getPR(day.id,si,item.name):null;
      var isPR=prevWeight&&pr&&prevWeight.kg>=pr;
      // store item name safely in a data attribute
      html+='<div class="exercise-item'+(checked?' checked':'')+'" data-day="'+day.id+'" data-si="'+si+'" data-ii="'+ii+'" data-name="'+encodeURIComponent(item.name)+'">'
        +'<div class="checkbox" onclick="toggleCheck(this.parentNode)">'+(checked?'✓':'')+'<\/div>'
        +'<div class="exercise-text" onclick="toggleCheck(this.parentNode)">'
        +'<div class="exercise-name">'+item.name+(isPR?' <span style=\"background:var(--accent);color:#000;font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;margin-left:4px;\">🏆 PR<\/span>':'')+'<\/div>'
        +(item.detail?'<div class="exercise-detail">'+item.detail+'<\/div>':'')
        +'<\/div>';
      if(isWorkingSet){
        var placeholder=lastWeekWeight&&!prevWeight?lastWeekWeight.kg+'':'kg';
        var loggedVal=prevWeight?prevWeight.kg:'';
        html+='<div class="weight-logger" onclick="event.stopPropagation()">'
          +'<input class="weight-input" id="'+inputId+'" type="number" min="0" step="0.5" placeholder="'+placeholder+'" value="'+loggedVal+'">'
          +'<span class="weight-unit">kg<\/span>'
          +(lastWeekWeight&&!prevWeight?'<span class="prev-weight">prev:'+lastWeekWeight.kg+'<\/span>':'')
          +'<button class="log-save-btn" id="'+inputId+'_btn" onclick="logWeight(''+inputId+'')">'+(prevWeight?'✓ '+prevWeight.kg+'kg':'Log')+'<\/button>'
          +'<span class="pr-badge" id="'+inputId+'_pr" style="display:none;background:var(--accent);color:#000;font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;">🏆 PR!<\/span>'
          +'<\/div>';
      }
      html+='<\/div>';
    });
    html+='<\/div>';
  });
  document.getElementById('workout-content').innerHTML=html;
}

// ─── HISTORY RENDER ──────────────────────────────────────────
function renderHistory(){
  var curWeek=getCurrentWeek();
  var totalEx=0,totalDays=0;
  var weekData=[];
  for(var w=1;w<=curWeek;w++){
    var days=getDaysForWeek(w);
    var phase=getPhaseForWeek(w);
    var exDone=0,exTotal=0;
    var dayStats=days.map(function(day,di){
      var s=countDayStats(w,day);
      exDone+=s.done;exTotal+=s.total;
      return {done:s.done,total:s.total,label:day.label};
    });
    totalEx+=exDone;
    totalDays+=dayStats.filter(function(d){return d.done===d.total&&d.total>0;}).length;
    weekData.push({w:w,phase:phase,dayStats:dayStats,exDone:exDone,exTotal:exTotal,isCurrent:w===curWeek});
  }

  var html='<div class="history-title">HISTORY<\/div>'
    +'<div class="history-sub">Saved locally · Tap a week to edit.<\/div>'
    +'<div class="stats-row">'
    +'<div class="stat-card"><div class="stat-num">'+curWeek+'<\/div><div class="stat-label">Weeks In<\/div><\/div>'
    +'<div class="stat-card"><div class="stat-num">'+totalDays+'<\/div><div class="stat-label">Days Done<\/div><\/div>'
    +'<div class="stat-card"><div class="stat-num">'+totalEx+'<\/div><div class="stat-label">Exercises<\/div><\/div>'
    +'<\/div>';

  weekData.reverse().forEach(function(wd){
    var pct=wd.exTotal>0?Math.round((wd.exDone/wd.exTotal)*100):0;
    var tagClass=wd.isCurrent?'current':(wd.phase===1?'p1':'p2');
    var tagLabel=wd.isCurrent?'Current':(wd.phase===1?'Phase 1':'Phase 2');
    var todayIdx=jsToIdx[new Date().getDay()];
    html+='<div class="week-card" onclick="jumpToWeek('+wd.w+')">'
      +'<div class="week-card-header"><div class="week-card-title">WEEK '+wd.w+'<\/div>'
      +'<div class="week-phase-tag '+tagClass+'">'+tagLabel+'<\/div><\/div>'
      +'<div class="day-dots">';
    wd.dayStats.forEach(function(d,di){
      var complete=d.done===d.total&&d.total>0;
      var partial=d.done>0&&d.done<d.total;
      var isToday=wd.isCurrent&&di===todayIdx;
      html+='<div class="day-dot'+(complete?' done':partial?' partial':'')+(isToday?' today':'')+'"><div class="dot-label">'+d.label.slice(0,2)+'<\/div><div class="dot-icon">'+(complete?'✓':partial?'·':'')+'<\/div><\/div>';
    });
    html+='<\/div><div class="week-bar-wrap"><div class="week-bar"><div class="week-bar-fill" style="width:'+pct+'%"><\/div><\/div>'
      +'<div class="week-bar-pct">'+pct+'%<\/div><\/div>'
      +'<div class="week-ex-count"><span>'+wd.exDone+'<\/span>\/'+wd.exTotal+' exercises · <span>'+wd.dayStats.filter(function(d){return d.done===d.total&&d.total>0;}).length+'<\/span>\/'+wd.dayStats.length+' days<\/div>'
      +'<div class="week-card-footer">Tap to edit →<\/div><\/div>';
  });
  document.getElementById('history-content').innerHTML=html;
}

// ─── GLOBAL ACTIONS ──────────────────────────────────────────
function toggle(si,ii){
  var days=getDaysForWeek(viewingWeek);
  var day=days[activeDayIdx];
  setCheck(viewingWeek,day.id,si,ii,!getCheck(viewingWeek,day.id,si,ii));
  renderWorkout();
}
function toggleCheck(el){
  var si=parseInt(el.getAttribute('data-si'));
  var ii=parseInt(el.getAttribute('data-ii'));
  toggle(si,ii);
}
function logWeight(inputId){
  var input=document.getElementById(inputId);
  if(!input||!input.value) return;
  var el=input.closest('.exercise-item');
  if(!el) return;
  var dayId=el.getAttribute('data-day');
  var si=parseInt(el.getAttribute('data-si'));
  var name=decodeURIComponent(el.getAttribute('data-name'));
  var kg=parseFloat(input.value);
  var pr=getPR(dayId,si,name);
  saveWeight(dayId,si,name,viewingWeek,kg,'');
  localStorage.setItem('grind_weights',JSON.stringify(weightData));
  var btn=document.getElementById(inputId+'_btn');
  if(btn) btn.textContent='✓ '+kg+'kg';
  var prEl=document.getElementById(inputId+'_pr');
  if(prEl&&(pr===null||kg>pr)){prEl.style.display='inline-block';}
}
function resetDay(){
  var days=getDaysForWeek(viewingWeek);
  clearDayChecks(viewingWeek,days[activeDayIdx]);
  renderWorkout();
}
function changeWeek(delta){
  var next=viewingWeek+delta;
  var maxWeek=isPhase2Unlocked()?getCurrentWeek():Math.max(getCurrentWeek(),PHASE2_WEEKS);
  if(next<1||next>maxWeek) return;
  viewingWeek=next;
  viewingPhase=getPhaseForWeek(viewingWeek);
  activeDayIdx=0;
  renderWorkout();
}
function setDay(idx){activeDayIdx=idx;renderWorkout();}
function switchPhase(p){viewingPhase=p;activeDayIdx=0;renderWorkout();}
function jumpToWeek(w){viewingWeek=w;viewingPhase=getPhaseForWeek(w);activeDayIdx=0;switchScreen('workout');}
function switchScreen(name){
  activeScreen=name;
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active');});
  document.getElementById('screen-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  document.getElementById('workout-header-extra').style.display=name==='workout'?'':'none';
  if(name==='history') renderHistory();
  else renderWorkout();
}

// ─── BOOT ────────────────────────────────────────────────────
renderPhaseBanner();
loadFromCloud();
</script>
</body>
</html>
